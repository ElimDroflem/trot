<!doctype html>
<html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); }
  .specimen { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 110px; flex: none; }
  .display-lg { font-size: 48px; }
  .display-md { font-size: 32px; }
  .stack > * + * { margin-top: 14px; }
</style>
</head><body>
  <div class="stack">
    <div class="specimen"><div class="label">display.lg / 48</div><div class="display-lg">Luna's week.</div></div>
    <div class="specimen"><div class="label">display.md / 32</div><div class="display-md">14 days. Her longest streak.</div></div>
  </div>
</body></html>
