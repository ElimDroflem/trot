<!doctype html>
<html><head><meta charset="utf-8"><title>Surface colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-1); font-family: var(--font-ui); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); background: var(--bg-2); }
  .chip { height: 70px; border: 1px solid var(--brand-divider); }
  .meta { padding: 10px 12px; }
  .name { font-size: 13px; font-weight: 600; color: var(--fg-1); }
  .hex { font-size: 12px; color: var(--fg-2); font-family: var(--font-mono); margin-top: 2px; }
</style>
</head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FAF7F2"></div><div class="meta"><div class="name">surface</div><div class="hex">#FAF7F2</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">surface.elevated</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F2EDE4"></div><div class="meta"><div class="name">surface.sunken</div><div class="hex">#F2EDE4</div></div></div>
  </div>
</body></html>
