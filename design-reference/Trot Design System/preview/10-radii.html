<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); font-family: var(--font-ui); display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 76px; background: var(--brand-primary-tint); border: 1px solid var(--brand-primary); }
  .lab { font-size: 11px; color: var(--fg-2); margin-top: 8px; font-family: var(--font-mono); }
</style>
</head><body>
  <div class="item"><div class="box" style="border-radius: 8px"></div><div class="lab">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius: 12px"></div><div class="lab">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius: 16px"></div><div class="lab">lg · 16</div></div>
  <div class="item"><div class="box" style="border-radius: 24px"></div><div class="lab">xl · 24</div></div>
  <div class="item"><div class="box" style="border-radius: 9999px"></div><div class="lab">circle</div></div>
</body></html>
