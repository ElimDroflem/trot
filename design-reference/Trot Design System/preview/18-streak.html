<!doctype html>
<html><head><meta charset="utf-8"><title>Streak badge</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); font-family: var(--font-ui); display: flex; gap: 16px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--brand-primary-tint); color: #7A2C16; padding: 8px 14px; border-radius: 9999px; font-weight: 600; font-size: 14px; }
  .badge i[data-lucide] { width: 16px; height: 16px; }
  .big { background: white; border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-card); }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 1; color: var(--brand-primary); letter-spacing: -0.02em; }
  .sub { font-size: 13px; color: var(--fg-2); margin-top: 4px; }
</style></head><body>
  <span class="badge"><i data-lucide="flame"></i> 14-day streak</span>
  <div class="big">
    <div class="num">14</div>
    <div class="sub">days. Luna's longest streak so far.</div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
