<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); font-family: var(--font-ui); display: grid; gap: 14px; }
  label { font-size: 13px; font-weight: 600; color: var(--fg-1); margin-bottom: 6px; display: block; }
  .input { width: 100%; box-sizing: border-box; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--brand-divider); background: white; font: inherit; font-size: 17px; color: var(--fg-1); min-height: 48px; }
  .input:focus { outline: 2px solid color-mix(in oklab, var(--brand-primary), transparent 65%); outline-offset: 2px; border-color: var(--brand-primary); }
  .help { font-size: 13px; color: var(--fg-2); margin-top: 4px; }
  .error { color: var(--brand-error); }
  .field-error .input { border-color: var(--brand-error); }
</style>
</head><body>
  <div><label>Dog's name</label><input class="input" value="Luna"></div>
  <div class="field-error"><label>Weight (kg)</label><input class="input" value="abc"><div class="help error">Use numbers only.</div></div>
</body></html>
