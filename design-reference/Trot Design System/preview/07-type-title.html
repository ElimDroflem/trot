<!doctype html>
<html><head><meta charset="utf-8"><title>Title type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 110px; flex: none; }
  .stack > * + * { margin-top: 14px; }
</style>
</head><body>
  <div class="stack">
    <div class="row"><div class="label">title.lg / 28</div><h1 class="title-lg">Today's walk</h1></div>
    <div class="row"><div class="label">title.md / 22</div><h2 class="title-md">This week</h2></div>
    <div class="row"><div class="label">title.sm / 17</div><h3 class="title-sm">Recent walks</h3></div>
  </div>
</body></html>
