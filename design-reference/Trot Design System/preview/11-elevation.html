<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-1); font-family: var(--font-ui); display: flex; gap: 24px; align-items: center; }
  .item { text-align: center; }
  .box { width: 140px; height: 90px; background: #fff; border-radius: 16px; }
  .lab { font-size: 11px; color: var(--fg-2); margin-top: 12px; font-family: var(--font-mono); }
  .b1 { box-shadow: 0 1px 2px rgba(31,27,22,0.06); }
  .b2 { box-shadow: var(--shadow-card); }
  .b3 { box-shadow: var(--shadow-elevated); }
</style>
</head><body>
  <div class="item"><div class="box b1"></div><div class="lab">pressed</div></div>
  <div class="item"><div class="box b2"></div><div class="lab">card (default)</div></div>
  <div class="item"><div class="box b3"></div><div class="lab">elevated (sheets)</div></div>
</body></html>
