<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); font-family: var(--font-ui); }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; font-size: 13px; }
  .lab { width: 110px; font-family: var(--font-mono); color: var(--fg-3); font-size: 11px; }
  .bar { background: var(--brand-primary); height: 14px; border-radius: 4px; }
  .val { color: var(--fg-2); font-family: var(--font-mono); font-size: 11px; }
</style>
</head><body>
  <div class="row"><div class="lab">space.xs</div><div class="bar" style="width:4px"></div><div class="val">4</div></div>
  <div class="row"><div class="lab">space.sm</div><div class="bar" style="width:8px"></div><div class="val">8</div></div>
  <div class="row"><div class="lab">space.md</div><div class="bar" style="width:16px"></div><div class="val">16</div></div>
  <div class="row"><div class="lab">space.lg</div><div class="bar" style="width:24px"></div><div class="val">24</div></div>
  <div class="row"><div class="lab">space.xl</div><div class="bar" style="width:32px"></div><div class="val">32</div></div>
  <div class="row"><div class="lab">space.xxl</div><div class="bar" style="width:48px"></div><div class="val">48</div></div>
  <div class="row"><div class="lab">space.huge</div><div class="bar" style="width:64px"></div><div class="val">64</div></div>
</body></html>
