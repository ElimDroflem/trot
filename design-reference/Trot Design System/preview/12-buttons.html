<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); font-family: var(--font-ui); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn { padding: 14px 22px; border-radius: 12px; font-weight: 600; font-size: 17px; border: none; cursor: pointer; text-align: center; }
  .primary { background: var(--brand-primary); color: white; }
  .secondary { background: var(--brand-secondary-tint); color: var(--brand-secondary); }
  .plain { background: transparent; color: var(--brand-primary); }
  .destructive { background: var(--brand-error); color: white; }
</style>
</head><body>
  <button class="btn primary">Log a walk</button>
  <button class="btn secondary">Add another dog</button>
  <button class="btn plain">Skip for now</button>
  <button class="btn destructive">Delete walk</button>
</body></html>
