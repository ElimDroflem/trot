<!doctype html>
<html><head><meta charset="utf-8"><title>Voice in practice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-1); font-family: var(--font-ui); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td { padding: 10px 8px; vertical-align: top; border-bottom: 1px solid var(--brand-divider); }
  .ctx { color: var(--fg-3); width: 110px; font-family: var(--font-mono); font-size: 11px; }
  .wrong { color: var(--brand-error); text-decoration: line-through; }
  .right { color: var(--fg-1); font-weight: 500; }
  th { text-align: left; font-size: 11px; color: var(--fg-3); padding-bottom: 6px; font-weight: 600; }
</style></head><body>
  <table>
    <tr><th></th><th>Wrong</th><th>Right</th></tr>
    <tr><td class="ctx">walk detected</td><td class="wrong">Awesome walk! 🎉</td><td class="right">28-minute walk. Was that with Luna?</td></tr>
    <tr><td class="ctx">streak hit</td><td class="wrong">Amazing streak!! 🔥</td><td class="right">14 days. Luna's longest streak so far.</td></tr>
    <tr><td class="ctx">under target</td><td class="wrong">Don't let Luna down!</td><td class="right">Luna's had 15 minutes today. Her target is 60.</td></tr>
  </table>
</body></html>
