<!doctype html>
<html><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-1); }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 110px; flex: none; }
  .stack > * + * { margin-top: 14px; }
</style>
</head><body>
  <div class="stack">
    <div class="row"><div class="label">body.lg / 17</div><p class="body-lg">Luna's had 28 minutes today. Her target is 60.</p></div>
    <div class="row"><div class="label">body.md / 15</div><p class="body-md">Beagles need 60–90 minutes daily. We've adjusted to her age.</p></div>
    <div class="row"><div class="label">caption / 13</div><p class="caption">Logged at 7:42 am · Passive detection</p></div>
    <div class="row"><div class="label">caption.bold</div><p class="caption-bold">CONFIRMED</p></div>
  </div>
</body></html>
